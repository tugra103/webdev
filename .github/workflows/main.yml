name: RunCommand

on:
  workflow_dispatch:

jobs:
  create-nextjs-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Create Next.js app
        run: | 
          git pull
          # Eğer klasör yoksa oluştur, varsa geç
          if [ ! -d "my-app" ]; then
            npx create-next-app@latest . --yes
          fi
          ls -la my-app
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add my-app
          git commit -m "Add my-app via workflow" || echo "No changes to commit"
          git push
